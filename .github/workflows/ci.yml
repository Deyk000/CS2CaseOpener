name: CI

on:
  pull_request:
    paths:
      - 'cs2-case-opener/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs2-case-opener
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cs2-case-opener/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Audit (informational)
        run: npm audit --omit=dev || true
        continue-on-error: true
