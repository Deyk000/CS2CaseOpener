name: Sync case data & prices

on:
  schedule:
    # Daily at 04:00 UTC.
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cs2-case-opener
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cs2-case-opener/package-lock.json

      - name: Install
        run: npm ci

      - name: Refresh case + skin images
        run: npm run sync:api

      - name: Refresh EUR prices
        run: npm run sync:prices

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          path: .
          branch: sync/auto-${{ github.run_number }}
          commit-message: 'chore(sync): refresh case data + prices'
          title: 'chore(sync): refresh case data + prices'
          body: |
            Automated nightly sync.

            - Re-pulled ByMykel CSGO-API case + skin data.
            - Re-pulled Skinport EUR prices.

            Generated by `.github/workflows/sync.yml`.
          delete-branch: true
